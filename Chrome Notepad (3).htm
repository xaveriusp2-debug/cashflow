<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio & Cashflow AI Planner</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Recharts & Dependencies -->
    <script crossorigin src="https://unpkg.com/prop-types@15.6.0/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.12.0/umd/Recharts.js"></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

        // --- DATA AWAL ---
        const INITIAL_DATA = [
            { id: 1, date: '2026-03-01', type: 'Pemasukan', category: 'Gaji Magang / Intern', amount: 3000000, description: 'Gaji bulanan Corp Fin' },
            { id: 2, date: '2026-03-05', type: 'Pengeluaran', category: 'Operasional Bisnis', amount: 500000, description: 'Langganan software / data feed' },
            { id: 3, date: '2026-03-10', type: 'Pemasukan', category: 'Trading Profit', amount: 1500000, description: 'Swing trade saham perbankan' },
            { id: 4, date: '2026-03-12', type: 'Pengeluaran', category: 'Konsumsi Pribadi', amount: 750000, description: 'Makan dan transportasi mingguan' },
            { id: 5, date: '2026-03-15', type: 'Pengeluaran', category: 'Modal Investasi', amount: 2000000, description: 'Top up RDN untuk investasi jangka panjang' },
            { id: 6, date: '2026-03-20', type: 'Pengeluaran', category: 'Edukasi / Buku', amount: 300000, description: 'Beli buku Corporate Valuation' },
            { id: 7, date: '2026-03-25', type: 'Pemasukan', category: 'Dividen', amount: 250000, description: 'Dividen kuartalan' },
        ];

        const COLORS = ['#0088FE', '#00C49F', '#FFBB28', '#FF8042', '#8884D8', '#FF6666'];

        // --- FUNGSI API GEMINI ---
        const callGeminiApi = async (payload) => {
            // TODO: GANTI TEKS DI BAWAH INI DENGAN API KEY GEMINI KAMU
            // Dapatkan gratis di: https://aistudio.google.com/
            const apiKey = "MASUKKAN_API_KEY_KAMU_DISINI"; 
            
            if (!apiKey || apiKey === "MASUKKAN_API_KEY_KAMU_DISINI") {
                throw new Error("API_KEY_MISSING");
            }

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            let retries = 3;
            let delay = 1000;
            
            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    return await response.json();
                } catch (error) {
                    retries--;
                    if (retries === 0) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        };

        // --- KOMPONEN UTAMA ---
        function App() {
            const [transactions, setTransactions] = useState(INITIAL_DATA);
            const [inputType, setInputType] = useState('manual');
            
            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                type: 'Pemasukan',
                category: '',
                amount: '',
                description: ''
            });

            const [aiInputText, setAiInputText] = useState('');
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [aiInputError, setAiInputError] = useState('');

            const [aiAdvice, setAiAdvice] = useState('');
            const [isAdvisorLoading, setIsAdvisorLoading] = useState(false);

            // Perhitungan Agregat
            const totals = useMemo(() => {
                let income = 0; let expense = 0;
                transactions.forEach(t => {
                    if (t.type === 'Pemasukan') income += t.amount;
                    else expense += t.amount;
                });
                return { income, expense, net: income - expense };
            }, [transactions]);

            const pieData = useMemo(() => {
                const expenses = transactions.filter(t => t.type === 'Pengeluaran');
                const grouped = expenses.reduce((acc, curr) => {
                    acc[curr.category] = (acc[curr.category] || 0) + curr.amount;
                    return acc;
                }, {});
                return Object.keys(grouped).map(key => ({ name: key, value: grouped[key] }));
            }, [transactions]);

            const barData = useMemo(() => {
                const grouped = transactions.reduce((acc, curr) => {
                    if (!acc[curr.date]) acc[curr.date] = { date: curr.date, Pemasukan: 0, Pengeluaran: 0 };
                    acc[curr.date][curr.type] += curr.amount;
                    return acc;
                }, {});
                return Object.values(grouped).sort((a, b) => new Date(a.date) - new Date(b.date));
            }, [transactions]);

            // Handlers
            const handleInputChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));

            const handleSubmitManual = (e) => {
                e.preventDefault();
                if (!formData.date || !formData.category || !formData.amount) return;
                const newTx = {
                    id: Date.now(),
                    date: formData.date, type: formData.type, category: formData.category,
                    amount: parseFloat(formData.amount), description: formData.description
                };
                setTransactions([...transactions, newTx]);
                setFormData({ ...formData, category: '', amount: '', description: '' });
            };

            const handleDelete = (id) => setTransactions(transactions.filter(t => t.id !== id));

            const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);

            // AI Handlers
            const handleAiSubmit = async (e) => {
                e.preventDefault();
                if (!aiInputText.trim()) return;
                setIsAiLoading(true); setAiInputError('');

                const todayDate = new Date().toISOString().split('T')[0];
                const payload = {
                    contents: [{ parts: [{ text: `Teks masukan: "${aiInputText}"` }] }],
                    systemInstruction: {
                        parts: [{ 
                            text: `Ekstrak transaksi keuangan. Hari ini tanggal ${todayDate}. Format output JSON murni tanpa markdown.
                            Keys: "date" (YYYY-MM-DD), "type" ("Pemasukan"/"Pengeluaran"), "category" (string singkat), "amount" (angka bulat), "description" (string).`
                        }]
                    },
                    generationConfig: {
                        responseMimeType: "application/json"
                    }
                };

                try {
                    const result = await callGeminiApi(payload);
                    const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (textResponse) {
                        const parsedData = JSON.parse(textResponse);
                        const newTx = {
                            id: Date.now(),
                            date: parsedData.date || todayDate,
                            type: parsedData.type === 'Pemasukan' ? 'Pemasukan' : 'Pengeluaran',
                            category: parsedData.category || 'Lainnya',
                            amount: parseFloat(parsedData.amount) || 0,
                            description: parsedData.description || aiInputText
                        };
                        setTransactions(prev => [...prev, newTx]);
                        setAiInputText('');
                    } else throw new Error("Format error");
                } catch (err) {
                    if(err.message === "API_KEY_MISSING") {
                        setAiInputError('ERROR: Kamu belum memasukkan API Key di file HTML ini. Silakan edit file planner.html.');
                    } else {
                        setAiInputError('Gagal memproses. Coba bahasa yang lebih jelas.');
                    }
                } finally {
                    setIsAiLoading(false);
                }
            };

            const handleGetAdvice = async () => {
                setIsAdvisorLoading(true); setAiAdvice('');
                const promptText = `
                    Berikan analisis dan 3 poin saran keuangan ala financial planner profesional berbahasa Indonesia.
                    Pemasukan: Rp${totals.income}, Pengeluaran: Rp${totals.expense}, Sisa: Rp${totals.net}.
                    Pengeluaran top: ${pieData.sort((a,b) => b.value - a.value).slice(0, 3).map(d => `${d.name} (Rp${d.value})`).join(', ')}.
                    Format output HTML sederhana: gunakan <strong> dan <ul><li>. Tanpa markdown ticks.
                `;

                try {
                    const result = await callGeminiApi({ contents: [{ parts: [{ text: promptText }] }] });
                    const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (textResponse) setAiAdvice(textResponse.replace(/```html|```/g, ''));
                } catch (err) {
                    if(err.message === "API_KEY_MISSING") {
                        setAiAdvice('<p class="text-red-500 font-bold">ERROR: Kamu belum memasukkan API Key di file HTML ini.</p>');
                    } else {
                        setAiAdvice('<p class="text-red-500">Gagal mengambil saran. Periksa koneksi atau coba lagi.</p>');
                    }
                } finally {
                    setIsAdvisorLoading(false);
                }
            };

            return (
                <div className="p-4 md:p-8">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {/* HEADER */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-900 flex items-center gap-2">
                                    Portfolio & Cashflow <span className="text-indigo-600">AI Planner</span>
                                </h1>
                                <p className="text-slate-500 mt-1">Disiplin pencatatan adalah kunci sukses di Capital Market & Corp Fin.</p>
                            </div>
                            <button onClick={handleGetAdvice} disabled={isAdvisorLoading}
                                className="mt-4 md:mt-0 px-5 py-2.5 bg-indigo-50 text-indigo-700 hover:bg-indigo-100 font-medium rounded-xl flex items-center gap-2 transition-colors disabled:opacity-50">
                                {isAdvisorLoading ? <i className="fa-solid fa-spinner fa-spin text-lg"></i> : <i className="fa-solid fa-robot text-lg"></i>}
                                ✨ Dapatkan Insight AI
                            </button>
                        </div>

                        {/* AI ADVICE BOX */}
                        {aiAdvice && (
                            <div className="bg-gradient-to-r from-indigo-900 to-slate-900 text-white p-6 rounded-2xl shadow-md border border-indigo-800 relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-6 opacity-10"><i className="fa-solid fa-robot text-9xl"></i></div>
                                <h3 className="text-xl font-bold mb-4 flex items-center gap-2 text-indigo-200">
                                    <i className="fa-solid fa-wand-magic-sparkles text-yellow-400"></i> Analisis & Saran Keuangan
                                </h3>
                                <div className="relative z-10 text-slate-200 text-sm md:text-base leading-relaxed"
                                    dangerouslySetInnerHTML={{ __html: aiAdvice }} />
                            </div>
                        )}

                        {/* SUMMARY CARDS */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                <div className="p-3 bg-emerald-100 text-emerald-600 rounded-xl"><i className="fa-solid fa-arrow-trend-up text-2xl"></i></div>
                                <div><p className="text-sm text-slate-500 font-medium">Total Pemasukan</p><h3 className="text-2xl font-bold">{formatRupiah(totals.income)}</h3></div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                <div className="p-3 bg-rose-100 text-rose-600 rounded-xl"><i className="fa-solid fa-arrow-trend-down text-2xl"></i></div>
                                <div><p className="text-sm text-slate-500 font-medium">Total Pengeluaran</p><h3 className="text-2xl font-bold">{formatRupiah(totals.expense)}</h3></div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center space-x-4">
                                <div className={`p-3 rounded-xl ${totals.net >= 0 ? 'bg-indigo-100 text-indigo-600' : 'bg-red-100 text-red-600'}`}>
                                    <i className="fa-solid fa-wallet text-2xl"></i>
                                </div>
                                <div><p className="text-sm text-slate-500 font-medium">Net Saldo (Amunisi Porto)</p>
                                <h3 className={`text-2xl font-bold ${totals.net >= 0 ? 'text-indigo-700' : 'text-red-600'}`}>{formatRupiah(totals.net)}</h3></div>
                            </div>
                        </div>

                        {/* CHARTS */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h3 className="text-lg font-bold mb-4">Tren Arus Kas Harian</h3>
                                <div className="h-72">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={barData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E2E8F0" />
                                            <XAxis dataKey="date" tick={{fontSize: 12}} stroke="#94A3B8" />
                                            <YAxis tick={{fontSize: 12}} stroke="#94A3B8" tickFormatter={(v) => `Rp${v/1000}k`} />
                                            <Tooltip formatter={(v) => formatRupiah(v)} />
                                            <Legend />
                                            <Bar dataKey="Pemasukan" fill="#10B981" radius={[4, 4, 0, 0]} />
                                            <Bar dataKey="Pengeluaran" fill="#F43F5E" radius={[4, 4, 0, 0]} />
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h3 className="text-lg font-bold mb-4">Alokasi Pengeluaran</h3>
                                <div className="h-72">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <PieChart>
                                            <Pie data={pieData} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={5} dataKey="value">
                                                {pieData.map((e, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
                                            </Pie>
                                            <Tooltip formatter={(v) => formatRupiah(v)} />
                                            <Legend layout="vertical" verticalAlign="middle" align="right" />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>

                        {/* DATA ENTRY & TABLE */}
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="bg-white p-0 rounded-2xl shadow-sm border border-slate-200 lg:col-span-1 h-fit overflow-hidden">
                                <div className="flex border-b border-slate-200">
                                    <button className={`flex-1 py-4 text-sm font-semibold transition-colors flex justify-center items-center gap-2 ${inputType === 'ai' ? 'bg-indigo-50 text-indigo-700 border-b-2 border-indigo-600' : 'text-slate-500 hover:bg-slate-50'}`} onClick={() => setInputType('ai')}>
                                        <i className="fa-solid fa-wand-magic-sparkles"></i> AI Input
                                    </button>
                                    <button className={`flex-1 py-4 text-sm font-semibold transition-colors flex justify-center items-center gap-2 ${inputType === 'manual' ? 'bg-indigo-50 text-indigo-700 border-b-2 border-indigo-600' : 'text-slate-500 hover:bg-slate-50'}`} onClick={() => setInputType('manual')}>
                                        <i className="fa-solid fa-circle-plus"></i> Manual Input
                                    </button>
                                </div>
                                <div className="p-6">
                                    {inputType === 'ai' ? (
                                        <form onSubmit={handleAiSubmit} className="space-y-4">
                                            <div className="bg-indigo-50/50 p-4 rounded-xl mb-4 border border-indigo-100">
                                                <p className="text-sm text-indigo-800 leading-relaxed">Ketik transaksi dengan bahasa sehari-hari. AI akan menebak tanggal, kategori, dan nominalnya!</p>
                                            </div>
                                            <textarea required rows="4" placeholder='Contoh: "Habis beli buku Corporate Finance 150 ribu barusan"' value={aiInputText} onChange={(e) => setAiInputText(e.target.value)} className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm" />
                                            {aiInputError && <p className="text-xs text-red-500 font-semibold">{aiInputError}</p>}
                                            <button type="submit" disabled={isAiLoading} className="w-full bg-indigo-600 text-white py-3 rounded-xl hover:bg-indigo-700 transition-all font-medium flex justify-center items-center gap-2 disabled:opacity-70">
                                                {isAiLoading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-wand-magic-sparkles"></i>}
                                                {isAiLoading ? 'Menganalisis...' : 'Catat Otomatis'}
                                            </button>
                                        </form>
                                    ) : (
                                        <form onSubmit={handleSubmitManual} className="space-y-4">
                                            <div><label className="block text-xs text-slate-500 mb-1 font-medium uppercase">Tanggal</label><input type="date" name="date" required value={formData.date} onChange={handleInputChange} className="w-full p-2.5 border rounded-lg text-sm" /></div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div><label className="block text-xs text-slate-500 mb-1 font-medium uppercase">Tipe</label><select name="type" value={formData.type} onChange={handleInputChange} className="w-full p-2.5 border rounded-lg text-sm"><option value="Pemasukan">Pemasukan</option><option value="Pengeluaran">Pengeluaran</option></select></div>
                                                <div><label className="block text-xs text-slate-500 mb-1 font-medium uppercase">Nominal</label><input type="number" name="amount" required placeholder="500000" value={formData.amount} onChange={handleInputChange} className="w-full p-2.5 border rounded-lg text-sm" /></div>
                                            </div>
                                            <div><label className="block text-xs text-slate-500 mb-1 font-medium uppercase">Kategori</label><input type="text" name="category" required placeholder="Cth: Trading..." value={formData.category} onChange={handleInputChange} className="w-full p-2.5 border rounded-lg text-sm" /></div>
                                            <div><label className="block text-xs text-slate-500 mb-1 font-medium uppercase">Ket. Tambahan</label><input type="text" name="description" placeholder="Catatan..." value={formData.description} onChange={handleInputChange} className="w-full p-2.5 border rounded-lg text-sm" /></div>
                                            <button type="submit" className="w-full bg-slate-900 text-white py-3 rounded-xl hover:bg-slate-800 transition-colors font-medium mt-2">Simpan Data</button>
                                        </form>
                                    )}
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2">
                                <h3 className="text-lg font-bold mb-4">Database Transaksi</h3>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-slate-50 text-slate-500 text-xs uppercase border-b border-slate-200"><th className="p-3 font-medium">Tanggal</th><th className="p-3 font-medium">Kategori & Ket</th><th className="p-3 font-medium text-right">Nominal</th><th className="p-3 font-medium text-center">Hapus</th></tr></thead>
                                        <tbody>
                                            {transactions.slice().reverse().map(tx => (
                                                <tr key={tx.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                    <td className="p-3 text-sm text-slate-500">{new Date(tx.date).toLocaleDateString('id-ID', {day:'numeric', month:'short'})}</td>
                                                    <td className="p-3"><div className="flex items-center"><span className={`w-2 h-2 rounded-full mr-2 flex-shrink-0 ${tx.type==='Pemasukan'?'bg-emerald-500':'bg-rose-500'}`}></span><div><p className="text-sm font-medium">{tx.category}</p><p className="text-xs text-slate-500 truncate max-w-[200px]">{tx.description}</p></div></div></td>
                                                    <td className={`p-3 text-sm font-semibold text-right ${tx.type==='Pemasukan'?'text-emerald-600':'text-rose-600'}`}>{tx.type==='Pemasukan'?'+':'-'}{formatRupiah(tx.amount)}</td>
                                                    <td className="p-3 text-center"><button onClick={()=>handleDelete(tx.id)} className="text-slate-400 hover:text-red-500 transition-colors"><i className="fa-solid fa-trash"></i></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Render React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
